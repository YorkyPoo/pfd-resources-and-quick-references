site_name: Poquoson Fire & Rescue Protocols
site_description: Frictionless, offline-capable EMS protocol and SOP dashboard
site_author: YorkyPoo
site_url: "https://yorkypoo.github.io/pfd-resources-and-quick-references/"
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - search.suggest
    - content.tabs.link
    - search.highlight
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.expand
  font:
    text: Roboto

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - offline

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

